<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PDF | SARVATRA</title>

<link rel="icon" href="../icon-192.png">

 <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0d6efd;
color:#fff;
text-align:center;
padding:20px;
}

header h1{
font-size:28px;
margin-bottom:5px;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

#imageInput{
width:100%;
padding:12px;
background:#fff;
border:2px dashed #0d6efd;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

#preview{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:15px;
margin-bottom:20px;
}

#preview img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
border:2px solid #ddd;
}

#convertBtn{
width:100%;
padding:15px;
font-size:18px;
background:#0d6efd;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#convertBtn:hover{
background:#0b5ed7;
}
#addMoreBtn{
width:100%;
padding:12px;
margin-bottom:20px;
font-size:16px;
background:#198754;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

#addMoreBtn:hover{
background:#157347;
}
    </style> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
    <h1>🖼️ Image to PDF</h1>
    <p>SARVATRA Tools</p>
</header>

<div class="container">

   <input
    type="file"
    id="imageInput"
    accept="image/*"
    multiple
>

<br><br>

<button id="addMoreBtn">
    ➕ Add More Images
</button>

<div id="preview"></div>

    <button id="convertBtn">
        📄 Convert to PDF
    </button>

</div>
 <script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", function () {

    preview.innerHTML = "";

    const files = this.files;

    for(let i = 0; i < files.length; i++){

        const reader = new FileReader();

        reader.onload = function(e){

            const img = document.createElement("img");
            img.src = e.target.result;

            preview.appendChild(img);

        };

        reader.readAsDataURL(files[i]);

    }

});
  const { jsPDF } = window.jspdf;

document.getElementById("convertBtn").addEventListener("click", async function () {

    const files = imageInput.files;

    if(files.length === 0){
        alert("Please select at least one image.");
        return;
    }

    const pdf = new jsPDF();

    for(let i = 0; i < files.length; i++){

        const dataUrl = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.readAsDataURL(files[i]);
        });

        if(i > 0){
            pdf.addPage();
        }

        pdf.addImage(dataUrl, "JPEG", 10, 10, 190, 270);

    }

    pdf.save("SARVATRA_Image_to_PDF.pdf");
 alert("✅ PDF Download Started!");

});
  
 </script>
<script>

const imageInput = document.getElementById("imageInput");
const addMoreBtn = document.getElementById("addMoreBtn");
const preview = document.getElementById("preview");
const convertBtn = document.getElementById("convertBtn");

let images = [];

imageInput.addEventListener("change", function () {
    addImages(this.files);
    this.value = "";
});

addMoreBtn.addEventListener("click", function () {
    imageInput.click();
});

function addImages(files){

    for(const file of files){

        if(!file.type.startsWith("image/")) continue;

        const reader = new FileReader();

        reader.onload = function(e){

            images.push({
                file:file,
                src:e.target.result,
                rotate:0
            });

            renderImages();

        };

        reader.readAsDataURL(file);

    }

}

function renderImages(){

    preview.innerHTML="";

    images.forEach((img,index)=>{

        const card=document.createElement("div");

        card.style.background="#fff";
        card.style.border="1px solid #ddd";
        card.style.borderRadius="10px";
        card.style.padding="10px";
        card.style.textAlign="center";

        card.innerHTML=`
        <img src="${img.src}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;">
        <p style="margin-top:8px;font-size:14px;">Image ${index+1}</p>
        `;

        preview.appendChild(card);

    });

}

</script>
</body>
</html>
