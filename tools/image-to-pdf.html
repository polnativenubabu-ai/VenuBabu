<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PDF | SARVATRA</title>

<link rel="icon" href="../icon-192.png">

 <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0d6efd;
color:#fff;
text-align:center;
padding:20px;
}

header h1{
font-size:28px;
margin-bottom:5px;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

#imageInput{
width:100%;
padding:12px;
background:#fff;
border:2px dashed #0d6efd;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

#preview{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:15px;
margin-bottom:20px;
}

#preview img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
border:2px solid #ddd;
}

#convertBtn{
width:100%;
padding:15px;
font-size:18px;
background:#0d6efd;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#convertBtn:hover{
background:#0b5ed7;
}
#addMoreBtn{
width:100%;
padding:12px;
margin-bottom:20px;
font-size:16px;
background:#198754;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

#addMoreBtn:hover{
background:#157347;
}
    </style> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
    <h1>🖼️ Image to PDF</h1>
    <p>SARVATRA Tools</p>
</header>

<div class="container">

   <input
    type="file"
    id="imageInput"
    accept="image/*"
    multiple
>

<br><br>

<button id="addMoreBtn">
    ➕ Add More Images
</button>

<div id="preview"></div>

    <button id="convertBtn">
        📄 Convert to PDF
    </button>

</div>
<script>

const imageInput = document.getElementById("imageInput");
const addMoreBtn = document.getElementById("addMoreBtn");
const preview = document.getElementById("preview");
const convertBtn = document.getElementById("convertBtn");
const { jsPDF } = window.jspdf;
let images = [];

imageInput.addEventListener("change", function () {
    addImages(this.files);
    this.value = "";
});

addMoreBtn.addEventListener("click", function () {
    imageInput.click();
});

function addImages(files){

    for(const file of files){

        if(!file.type.startsWith("image/")) continue;

        const reader = new FileReader();

        reader.onload = function(e){

            images.push({
                file:file,
                src:e.target.result,
                rotate:0
            });

            renderImages();

        };

        reader.readAsDataURL(file);

    }

}

function renderImages(){

    preview.innerHTML="";

    images.forEach((img,index)=>{

        const card=document.createElement("div");

        card.style.background="#fff";
        card.style.border="1px solid #ddd";
        card.style.borderRadius="10px";
        card.style.padding="10px";
        card.style.textAlign="center";

       card.innerHTML=`
<img src="${img.src}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;transform:rotate(${img.rotate}deg);transition:0.3s;">

<p style="margin:8px 0;font-size:14px;">Image ${index+1}</p>

<button onclick="moveUp(${index})">⬆️</button>

<button onclick="moveDown(${index})">⬇️</button>

<button onclick="rotateLeft(${index})">↺</button>

<button onclick="rotateRight(${index})">↻</button>

<button onclick="deleteImage(${index})">🗑️</button>
`;

        preview.appendChild(card);

    });

}
 function deleteImage(index){
    images.splice(index,1);
    renderImages();
}

function moveUp(index){
    if(index===0) return;

    [images[index-1],images[index]] =
    [images[index],images[index-1]];

    renderImages();
}

function moveDown(index){
    if(index===images.length-1) return;

    [images[index+1],images[index]] =
    [images[index],images[index+1]];

    renderImages();
}
 function rotateLeft(index){
    images[index].rotate -= 90;
    renderImages();
}

function rotateRight(index){
    images[index].rotate += 90;
    renderImages();
}
convertBtn.addEventListener("click", function(){

    if(images.length===0){
        alert("Please select images.");
        return;
    }

    const pdf = new jsPDF("p","mm","a4");

    let i=0;

    function addNext(){

        if(i>=images.length){

            pdf.save("SARVATRA_Image_to_PDF.pdf");

            alert("✅ PDF Download Started!");

            return;

        }

        const img=new Image();

  

         img.onload = function () {

    if (i > 0) {
        pdf.addPage();
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const angle = ((images[i].rotate % 360) + 360) % 360;

    if (angle === 90 || angle === 270) {
        canvas.width = img.height;
        canvas.height = img.width;
    } else {
        canvas.width = img.width;
        canvas.height = img.height;
    }

    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(angle * Math.PI / 180);
    ctx.drawImage(img, -img.width / 2, -img.height / 2);

    const rotatedImage = canvas.toDataURL("image/jpeg", 1.0);

    const pageWidth = 190;
    const pageHeight = 277;

    const ratio = Math.min(pageWidth / canvas.width, pageHeight / canvas.height);

    const pdfWidth = canvas.width * ratio;
    const pdfHeight = canvas.height * ratio;

    const x = (210 - pdfWidth) / 2;
    const y = (297 - pdfHeight) / 2;

    pdf.addImage(rotatedImage, "JPEG", x, y, pdfWidth, pdfHeight);

    i++;
    addNext();

};  

        img.src=images[i].src;

    

}
</script>
</body>
</html>
