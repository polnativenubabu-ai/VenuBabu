<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image to PDF | SARVATRA</title>

<link rel="icon" href="../icon-192.png">

</head>

<body>

<header>
    <h1>🖼️ Image to PDF</h1>
    <p>SARVATRA Tools</p>
</header>

<div class="container">

    <input
        type="file"
        id="imageInput"
        accept="image/*"
        multiple
    >

    <div id="preview"></div>

    <button id="convertBtn">
        📄 Convert to PDF
    </button>

</div>

</body>
</html>
