<!DOCTYPE html>
<html>
<head>
<title>SARVATRA Merge PDF</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body{
font-family: Arial;
padding:20px;
background:#f5f5f5;
}

h2{
color:#0d6efd;
}

.box{
background:white;
padding:20px;
border-radius:10px;
}

button{
background:#0d6efd;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
margin:5px;
}

.file{
background:#eee;
padding:10px;
margin:8px 0;
border-radius:8px;
}
</style>

</head>

<body>

<button onclick="goHome()">⬅️ Home</button>

<h2>📑 SARVATRA Merge PDF</h2>

<div class="box">

<input type="file" id="pdfFiles" accept="application/pdf" multiple>

<div id="list"></div>

<button onclick="mergePDF()">🔄 Merge PDF</button>

</div>


<script>

let files=[];

document.getElementById("pdfFiles").addEventListener("change",function(e){

files=[...e.target.files];

showFiles();

});


function showFiles(){

let list=document.getElementById("list");

list.innerHTML="";

files.forEach((file,index)=>{

list.innerHTML+=`

<div class="file">
📄 ${file.name}

<button onclick="removeFile(${index})">
❌ Remove
</button>

</div>

`;

});

}


function removeFile(index){

files.splice(index,1);

showFiles();

}



async function mergePDF(){

if(files.length<2){

alert("కనీసం 2 PDF Files ఎంచుకోండి");

return;

}


let mergedPdf = await PDFLib.PDFDocument.create();


for(let file of files){

let bytes = await file.arrayBuffer();

let pdf = await PDFLib.PDFDocument.load(bytes);

let pages = await mergedPdf.copyPages(pdf,pdf.getPageIndices());

pages.forEach(page=>mergedPdf.addPage(page));

}


let pdfBytes = await mergedPdf.save();


let blob = new Blob([pdfBytes],{type:"application/pdf"});


let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="SARVATRA_Merged_PDF.pdf";

link.click();


alert("✅ PDF Merge Completed!");

}



function goHome(){

window.location.href="index.html";

}

</script>


</body>
</html>
