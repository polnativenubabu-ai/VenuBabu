<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merge PDF | SARVATRA</title>

<link rel="icon" href="../icon-192.png">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0d6efd;
color:#fff;
text-align:center;
padding:20px;
position:relative;
}

header h1{
font-size:28px;
margin-bottom:5px;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.home-btn{
position:absolute;
left:15px;
top:15px;
background:#fff;
color:#0d6efd;
border:none;
padding:8px 14px;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.home-btn:hover{
background:#f1f1f1;
}

#pdfInput{
width:100%;
padding:12px;
background:#fff;
border:2px dashed #0d6efd;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

#addMoreBtn{
width:100%;
padding:12px;
margin-bottom:20px;
font-size:16px;
background:#198754;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

#addMoreBtn:hover{
background:#157347;
}

#preview{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#fff;
border:1px solid #ddd;
border-radius:10px;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
text-align:center;
}

.card h3{
font-size:16px;
margin-bottom:8px;
word-break:break-word;
}

.size{
color:#666;
font-size:14px;
margin-bottom:10px;
}

.action-btn{
padding:8px 10px;
margin:3px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.up{
background:#0d6efd;
color:#fff;
}

.down{
background:#6f42c1;
color:#fff;
}

.delete{
background:#dc3545;
color:#fff;
}

#mergeBtn{
width:100%;
padding:15px;
font-size:18px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

#mergeBtn:hover{
background:#0b5ed7;
}

</style>
</head>

<body>

<script>
function goHome(){
window.location.href="../index.html";
}
</script>

<header>

<button class="home-btn" onclick="goHome()">
🏠 Home
</button>

<h1>📑 Merge PDF</h1>

<p>SARVATRA Tools</p>

</header>

<div class="container">

<input
type="file"
id="pdfInput"
accept="application/pdf"
multiple>

<button id="addMoreBtn">
➕ Add More PDFs
</button>

<div id="preview"></div>

<button id="mergeBtn">
📑 Merge PDF
</button>

</div>

<script>
  // ===== PART 2 =====
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; 

const pdfInput = document.getElementById("pdfInput");
const addMoreBtn = document.getElementById("addMoreBtn");
const preview = document.getElementById("preview");
const mergeBtn = document.getElementById("mergeBtn");

let pdfFiles = [];

// Add PDFs
pdfInput.addEventListener("change", function () {

    addPDFs(this.files);

    this.value = "";

});

// Add More Button
addMoreBtn.addEventListener("click", function () {

    pdfInput.click();

});

// Add Files
function addPDFs(files){

    for(const file of files){

        if(file.type !== "application/pdf") continue;

        pdfFiles.push(file);

    }

    renderPDFs();

}

// File Size
function formatSize(bytes){

    if(bytes < 1024){

        return bytes + " Bytes";

    }

    if(bytes < 1024 * 1024){

        return (bytes / 1024).toFixed(2) + " KB";

    }

    return (bytes / 1024 / 1024).toFixed(2) + " MB";

}

// Preview
function renderPDFs(){

    preview.innerHTML = "";

    pdfFiles.forEach((file,index)=>{

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

<canvas
id="thumb-${index}"
style="
width:100%;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:10px;
">
</canvas>

<h3>📄 ${file.name}</h3>

<div class="size">
${formatSize(file.size)}
</div>

<button
class="action-btn up"
onclick="moveUp(${index})">
⬆️
</button>

<button
class="action-btn down"
onclick="moveDown(${index})">
⬇️
</button>

<button
class="action-btn delete"
onclick="deletePDF(${index})">
🗑️
</button>

`;

        preview.appendChild(card);

    });

}
// Move Up
function moveUp(index){

    if(index === 0) return;

    [pdfFiles[index - 1], pdfFiles[index]] =
    [pdfFiles[index], pdfFiles[index - 1]];

    renderPDFs();

}

// Move Down
function moveDown(index){

    if(index === pdfFiles.length - 1) return;

    [pdfFiles[index + 1], pdfFiles[index]] =
    [pdfFiles[index], pdfFiles[index + 1]];

    renderPDFs();

}

// Delete PDF
function deletePDF(index){

    pdfFiles.splice(index, 1);

    renderPDFs();

}

// Merge PDFs
mergeBtn.addEventListener("click", async function(){

    if(pdfFiles.length < 2){

        alert("Please select at least 2 PDF files.");

        return;

    }

    mergeBtn.disabled = true;
    mergeBtn.textContent = "⏳ Merging...";

    try{

        const mergedPdf = await PDFLib.PDFDocument.create();

        for(const file of pdfFiles){

            const bytes = await file.arrayBuffer();

            const pdf = await PDFLib.PDFDocument.load(bytes);

            const copiedPages = await mergedPdf.copyPages(
                pdf,
                pdf.getPageIndices()
            );

            copiedPages.forEach(page => mergedPdf.addPage(page));

        }

        const mergedBytes = await mergedPdf.save();

        const blob = new Blob([mergedBytes], {
            type: "application/pdf"
        });

        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");

        a.href = url;
        a.download = "merged.pdf";
        a.click();

        URL.revokeObjectURL(url);

    }catch(error){

        console.error(error);

        alert("Error while merging PDFs.");

    }

    mergeBtn.disabled = false;
    mergeBtn.textContent = "📑 Merge PDF";

});
  </script>
  </body>
</html>
