<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Password Remove | SARVATRA</title>

<link rel="icon" href="../icon-192.png">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
padding:20px;
text-align:center;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

button,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#222;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<button onclick="goHome()">
🏠 Home
</button>

<h1>🔓 PDF Password Remove</h1>

<p>SARVATRA Tools</p>

</header>


<div class="container">

<input
type="file"
id="pdfInput"
accept="application/pdf">


<input
type="password"
id="password"
placeholder="Enter PDF Password">


<button id="removeBtn">
🔓 Remove Password
</button>


<p id="status"></p>

</div>


<script>

function goHome(){
window.location.href="../index.html";
}
const pdfInput = document.getElementById("pdfInput");
const passwordInput = document.getElementById("password");
const removeBtn = document.getElementById("removeBtn");
const status = document.getElementById("status");

let selectedPDF = null;


// Select PDF
pdfInput.addEventListener("change", function(){

    selectedPDF = this.files[0];

});


// Remove Password
removeBtn.addEventListener("click", async function(){

    if(!selectedPDF){

        alert("Please select PDF file.");
        return;

    }


    if(passwordInput.value === ""){

        alert("Please enter PDF password.");
        return;

    }


    status.innerHTML = "⏳ Removing Password...";


    try{

        const bytes = await selectedPDF.arrayBuffer();


        const pdfDoc = await PDFLib.PDFDocument.load(
            bytes,
            {
                password: passwordInput.value
            }
        );


        const newPdf = await pdfDoc.save();


        const blob = new Blob(
            [newPdf],
            {
                type:"application/pdf"
            }
        );


        const url = URL.createObjectURL(blob);


        const a = document.createElement("a");

        a.href = url;
        a.download = "unlocked.pdf";
        a.click();


        URL.revokeObjectURL(url);


        status.innerHTML = "✅ Password Removed Successfully";


    }catch(error){

        console.log(error);

        status.innerHTML =
        "❌ Wrong password or unable to remove.";

    }


});

  
</script>


</body>

</html>
