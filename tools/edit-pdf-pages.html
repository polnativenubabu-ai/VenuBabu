<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Edit PDF Pages | SARVATRA</title>

<link rel="icon" href="../icon-192.png">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0d6efd;
color:#fff;
padding:20px;
text-align:center;
position:relative;
}

header h1{
font-size:28px;
margin-bottom:5px;
}

.container{
max-width:950px;
margin:20px auto;
padding:15px;
}

.home-btn{

position:absolute;
left:15px;
top:15px;

background:#fff;
color:#0d6efd;

border:none;
padding:8px 14px;

border-radius:8px;

font-size:15px;
font-weight:bold;

cursor:pointer;

box-shadow:0 2px 8px rgba(0,0,0,.2);

}

.refresh-btn{

position:absolute;
right:15px;
top:15px;

background:#fff;
color:#198754;

border:none;
padding:8px 14px;

border-radius:8px;

font-size:15px;
font-weight:bold;

cursor:pointer;

box-shadow:0 2px 8px rgba(0,0,0,.2);

}

.home-btn:hover,
.refresh-btn:hover{

background:#f1f1f1;

}

#pdfInput{

width:100%;
padding:12px;

background:#fff;

border:2px dashed #0d6efd;

border-radius:10px;

cursor:pointer;

margin-bottom:20px;

}
#preview{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));

gap:15px;

margin-bottom:20px;

}

#downloadBtn{

width:100%;

padding:15px;

font-size:18px;

background:#198754;

color:#fff;

border:none;

border-radius:10px;

cursor:pointer;

}

#downloadBtn:disabled{

background:#999;

cursor:not-allowed;

}

  
</style>

</head>
  <body>

<header>

<button
class="home-btn"
onclick="goHome()">
🏠 Home
</button>

<button
class="refresh-btn"
onclick="refreshPage()">
🔄 Refresh
</button>

<h1>📝 Edit PDF Pages</h1>

<p>SARVATRA Tools</p>

</header>

<div class="container">

<input
type="file"
id="pdfInput"
accept="application/pdf">

<div id="preview"></div>

<button
id="downloadBtn"
disabled>

💾 Download Edited PDF

</button>

</div>
    <script>

function goHome(){

window.location.href="../index.html";

}

function refreshPage(){

location.reload();

}

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const pdfInput =
document.getElementById("pdfInput");

const preview =
document.getElementById("preview");

const downloadBtn =
document.getElementById("downloadBtn");

let selectedPDF = null;
let pdfDoc = null;
let pages = [];    

pdfInput.addEventListener("change", async function () {

    selectedPDF = this.files[0];

    if (!selectedPDF) return;

    preview.innerHTML = "";
    pages = [];

    const fileReader = new FileReader();

    fileReader.onload = async function () {

        const typedArray = new Uint8Array(this.result);

        pdfDoc = await pdfjsLib.getDocument({
            data: typedArray
        }).promise;

        for (let i = 1; i <= pdfDoc.numPages; i++) {

            const page = await pdfDoc.getPage(i);

            const viewport = page.getViewport({
                scale: 0.6
            });

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

            const pageBox = document.createElement("div");

            pageBox.style.background = "#fff";
            pageBox.style.padding = "10px";
            pageBox.style.borderRadius = "10px";
            pageBox.style.boxShadow = "0 2px 8px rgba(0,0,0,.15)";
            pageBox.style.textAlign = "center";

            const title = document.createElement("p");
            title.innerHTML = "<b>Page " + i + "</b>";

            pageBox.appendChild(title);
            pageBox.appendChild(canvas);

            preview.appendChild(pageBox);

            pages.push(i - 1);

        }

        downloadBtn.disabled = false;

    };

    fileReader.readAsArrayBuffer(selectedPDF);

});
      
</script>

</body>

</html>
