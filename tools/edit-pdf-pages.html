<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit PDF Pages - SARVATRA</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#0d6efd;
    color:#fff;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

input[type=file]{
    width:100%;
    padding:10px;
    margin-bottom:20px;
}

#preview{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}

.page-card{
    background:#fff;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    text-align:center;
}

canvas{
    width:100%;
    height:auto;
    border:1px solid #ddd;
    border-radius:5px;
}

.page-title{
    margin:10px 0;
    font-weight:bold;
}

button{
    padding:8px 12px;
    margin:4px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.download{
    background:#28a745;
    color:#fff;
}

.home{
    background:#0d6efd;
    color:#fff;
}
</style>
</head>

<body>

<header>Edit PDF Pages</header>

<div class="container">

<input type="file" id="pdfInput" accept="application/pdf">

<div id="preview"></div>

<br>

<button class="download" id="saveBtn">💾 Download PDF</button>

<button class="home" onclick="location.href='../index.html'">🏠 Home</button>

</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
    

</body>
</html>
