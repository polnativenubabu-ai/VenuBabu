<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to JPG - SARVATRA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}
header{
background:#0d6efd;
color:#fff;
text-align:center;
padding:20px;
margin-bottom:20px;
position:relative;
border-radius:10px;
}

header h1{
font-size:28px;
margin-bottom:5px;
}

.home-btn{
position:absolute;
left:15px;
top:15px;
background:#fff;
color:#0d6efd;
border:none;
padding:8px 14px;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.home-btn:hover{
background:#f1f1f1;
}
</style>

</head>

<body>
  

  <script>
function goHome(){
    window.location.href="../index.html";
}
</script>

<header>
    <button class="home-btn" onclick="goHome()">🏠 Home</button>

    <h1>📄 PDF to JPG</h1>
    <p>SARVATRA Tools</p>
</header>
<div class="container">

    <input
        type="file"
        id="pdfInput"
        accept="application/pdf"
    >

    <button id="convertBtn">
        🔄 Convert to JPG
    </button>

    <div id="pagesContainer"></div>

    <p id="status"></p>

</div>
  
</body>
</html>
