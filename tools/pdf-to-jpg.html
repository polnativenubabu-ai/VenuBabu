<body>
  

  <script>
function goHome(){
    window.location.href="../index.html";
}
</script>

<header>
    <button class="home-btn" onclick="goHome()">🏠 Home</button>

    <h1>📄 PDF to JPG</h1>
    <p>SARVATRA Tools</p>
</header>
<div class="container">

    <input
        type="file"
        id="pdfInput"
        accept="application/pdf"
    >

    <button id="convertBtn">
        🔄 Convert to JPG
    </button>

<button id="addPdfBtn">
    ➕ Add More PDFs
</button>
  
  <button id="downloadAllBtn" style="display:none;">
    📦 Download All JPGs (ZIP)
  </button>

    <div id="pagesContainer"></div>

    <p id="status"></p>

</div>

  <script>

    const pdfInput = document.getElementById("pdfInput");
const convertBtn = document.getElementById("convertBtn");
const pagesContainer = document.getElementById("pagesContainer");
const status = document.getElementById("status");
const downloadAllBtn = document.getElementById("downloadAllBtn");
const addPdfBtn = document.getElementById("addPdfBtn");

let selectedFiles = [];
let jpgFiles = [];

// First Select
pdfInput.addEventListener("change", function () {

    selectedFiles = [];

    for (const file of this.files) {

        selectedFiles.push(file);

    }

    if (selectedFiles.length > 0) {

        status.textContent =
            "✅ " + selectedFiles.length + " PDF(s) Selected";

    } else {

        status.textContent = "";

    }

});

// Add More PDFs
addPdfBtn.addEventListener("click", function () {

    pdfInput.click();

});

convertBtn.addEventListener("click", async function () {

    if (selectedFiles.length === 0) {

        alert("Please select PDF files.");

        return;

    }

    jpgFiles = [];

    pagesContainer.innerHTML = "";

    downloadAllBtn.style.display = "none";

    status.textContent = "Converting...";

    let pdfIndex = 1;

    for (const pdfFile of selectedFiles) {

        await convertPDF(pdfFile, pdfIndex);

        pdfIndex++;

    }

    status.textContent = "✅ Conversion Completed";

    downloadAllBtn.style.display = "block";

});
async function convertPDF(file, pdfNumber){

    return new Promise(function(resolve){

        const reader = new FileReader();

        reader.onload = function(e){

            const typedArray = new Uint8Array(e.target.result);

            pdfjsLib.getDocument(typedArray).promise.then(async function(pdf){

                for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++){

                    const page = await pdf.getPage(pageNum);

                    const viewport = page.getViewport({
                        scale:2
                    });

                    const canvas = document.createElement("canvas");
                    const context = canvas.getContext("2d");

                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({
                        canvasContext:context,
                        viewport:viewport
                    }).promise;

                    createPageCard(
                        canvas,
                        pdfNumber,
                        pageNum
                    );

                }

                resolve();

            });

        };

        reader.readAsArrayBuffer(file);

    });

}

function createPageCard(canvas,pdfNumber,pageNum){

    const card = document.createElement("div");
            const downloadBtn = document.createElement("button");

    downloadBtn.textContent = "⬇️ Download JPG";

    downloadBtn.onclick = function () {

        const link = document.createElement("a");

        link.href = imageData;

        link.download =
            "PDF-" + pdfNumber +
            "-Page-" + pageNum + ".jpg";

        link.click();

    };
  downloadBtn.onclick = function () {

    const link = document.createElement("a");

    link.href = imageData;

    link.download =
        "PDF-" + pdfNumber +
        "-Page-" + pageNum + ".jpg";

    link.click();

};   // 👈 ఈ line తర్వాత paste చేయి

const rotateLeftBtn = document.createElement("button");

rotateLeftBtn.textContent = "↺ Rotate Left";

rotateLeftBtn.onclick = function () {

    rotation -= 90;

    canvas.style.transform = `rotate(${rotation}deg)`;

};

const rotateRightBtn = document.createElement("button");

rotateRightBtn.textContent = "↻ Rotate Right";

rotateRightBtn.onclick = function () {

    rotation += 90;

    canvas.style.transform = `rotate(${rotation}deg)`;

};

    const rotateLeftBtn = document.createElement("button");

    rotateLeftBtn.textContent = "↺ Rotate Left";

    rotateLeftBtn.onclick = function () {

        canvas.style.transform =
            "rotate(-90deg)";

    };

    const rotateRightBtn = document.createElement("button");

    rotateRightBtn.textContent = "↻ Rotate Right";

    rotateRightBtn.onclick = function () {

        canvas.style.transform =
            "rotate(90deg)";

    };

    card.appendChild(canvas);

    card.appendChild(downloadBtn);

    card.appendChild(rotateLeftBtn);

    card.appendChild(rotateRightBtn);

    pagesContainer.appendChild(card);

}

downloadAllBtn.addEventListener("click", async function () {

    const zip = new JSZip();

    jpgFiles.forEach(function(file){

        const base64 =
            file.data.split(",")[1];

        zip.file(file.name,
                  const zipBlob = await zip.generateAsync({
        type: "blob"
    });

    saveAs(zipBlob, "SARVATRA_PDF_to_JPG.zip");

});

function clearAll(){

    selectedFiles = [];

    jpgFiles = [];

    pagesContainer.innerHTML = "";

    status.textContent = "";

    if(pdfInput){

        pdfInput.value = "";

    }

    if(downloadAllBtn){

        downloadAllBtn.style.display = "none";

    }

}

window.addEventListener("beforeunload", function(){

    clearAll();

});

function goHome(){

    window.location.href = "../index.html";

}   
  </script>

  
</body>
</html>
