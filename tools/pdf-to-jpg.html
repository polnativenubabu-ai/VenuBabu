<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input[type=file]{
    width:100%;
    padding:10px;
    margin-bottom:20px;
}

#pagesContainer{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    margin-bottom:20px;
}
        #pagesContainer canvas{
    width:140px;
    height:auto;
    border:1px solid #ddd;
    border-radius:6px;
    display:block;
    margin:auto;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
 }
 .page-card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    text-align:center;
    background:#fff;
}

.page-card p{
    margin:8px 0;
    font-weight:bold;
}

.page-card button{
    width:45px;
    margin:4px;
    padding:8px;
}
#pagesContainer canvas{
    width: 140px;
    height: auto;
    border: 1px solid #ddd;
    border-radius: 6px;
    display: block;
    margin: auto;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

    </style>
    
</head>

<body>

<div class="container">

    <h2>PDF to JPG</h2>

    <input
        type="file"
        id="pdfInput"
        accept="application/pdf"
    >

    <div id="pagesContainer"></div>

    <button id="convertBtn">
        🖼️ Convert to JPG
    </button>

    <p id="status"></p>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script> 
  const pdfInput = document.getElementById("pdfInput");
const pagesContainer = document.getElementById("pagesContainer");
const convertBtn = document.getElementById("convertBtn");
const status = document.getElementById("status");

let pdfDoc = null;
let pages = []; 
let rotations = {};

    pdfInput.addEventListener("change", function () {

    const file = this.files[0];

    if (!file) return;

    status.textContent = "Loading PDF...";

    const reader = new FileReader();

    reader.onload = function (e) {

        const typedArray = new Uint8Array(e.target.result);

        pdfjsLib.getDocument(typedArray).promise.then(function (pdf) {

            pdfDoc = pdf;

            status.textContent = "Total Pages: " + pdf.numPages;
            pagesContainer.innerHTML = "";

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

                pdf.getPage(pageNum).then(function (page) {

                    // Render page here
                    const viewport = page.getViewport({
    scale: 0.4,
    rotation: rotations[pageNum] || 0
});

const canvas = document.createElement("canvas");
const context = canvas.getContext("2d");

canvas.width = viewport.width;
canvas.height = viewport.height;

page.render({
    canvasContext: context,
    viewport: viewport
}).promise.then(function () {

    const card = document.createElement("div");
card.className = "page-card";

const title = document.createElement("p");
title.textContent = "Page " + pageNum;

const leftBtn = document.createElement("button");
leftBtn.textContent = "↺";
    leftBtn.onclick = function () {
    alert("Rotate Left - Page " + pageNum);
};

const rightBtn = document.createElement("button");
rightBtn.textContent = "↻";
    rightBtn.onclick = function () {
    alert("Rotate Right - Page " + pageNum);
};

card.appendChild(canvas);
card.appendChild(title);
card.appendChild(leftBtn);
card.appendChild(rightBtn);

pagesContainer.appendChild(card);

});

                });

            }

        });

    };

    reader.readAsArrayBuffer(file);

});
    convertBtn.addEventListener("click", function () {
    const canvases = pagesContainer.querySelectorAll("canvas");

    canvases.forEach(function (canvas, index) {
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/jpeg", 1.0);
        link.download = "page-" + (index + 1) + ".jpg";
        link.click();
    });
});
</script>   
</body>
</html>
