<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input[type=file]{
    width:100%;
    padding:10px;
    margin-bottom:20px;
}

#pagesContainer{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

    </style>
    
</head>

<body>

<div class="container">

    <h2>PDF to JPG</h2>

    <input
        type="file"
        id="pdfInput"
        accept="application/pdf"
    >

    <div id="pagesContainer"></div>

    <button id="convertBtn">

    </button>

    <p id="status"></p>

</div>

</body>
</html>
