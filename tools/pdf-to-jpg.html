<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to JPG Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
}

input[type=file]{
width:100%;
padding:10px;
margin-bottom:20px;
}

#pagesContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
margin-bottom:20px;
}

.page-card{
background:#fff;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
text-align:center;
}

.page-card canvas{
width:100%;
height:auto;
border:1px solid #ddd;
border-radius:5px;
}

.page-card button{
margin-top:10px;
width:100%;
padding:8px;
background:#007bff;
color:#fff;
border:none;
margin-top:10px;
width:100%;
padding:8px;
background:#007bff;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

.page-card button:hover{
background:#0056b3;
}

#status{
text-align:center;
margin-top:15px;
font-weight:bold;
}
</style>
</head>
