<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG</title>
</head>

<body>

<div class="container">

    <h2>PDF to JPG</h2>

    <input
        type="file"
        id="pdfInput"
        accept="application/pdf"
    >

    <div id="pagesContainer"></div>

    <button id="convertBtn">
        🖼️ Convert to JPG
    </button>

    <p id="status"></p>

</div>

</body>
</html>
