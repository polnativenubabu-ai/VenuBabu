<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to JPG - SARVATRA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}
header{
background:#0d6efd;
color:#fff;
text-align:center;
padding:20px;
margin-bottom:20px;
position:relative;
border-radius:10px;
}

header h1{
font-size:28px;
margin-bottom:5px;
}

.home-btn{
position:absolute;
left:15px;
top:15px;
background:#fff;
color:#0d6efd;
border:none;
padding:8px 14px;
border-radius:8px;
font-size:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.home-btn:hover{
background:#f1f1f1;
}
  .container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

input[type=file]{
width:100%;
padding:12px;
margin-bottom:20px;
border:2px dashed #0d6efd;
border-radius:10px;
background:#fff;
cursor:pointer;
}

#convertBtn{
width:100%;
padding:15px;
font-size:18px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

#convertBtn:hover{
background:#0b5ed7;
}

#pagesContainer{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
margin-bottom:20px;
}

.page-card{
background:#fff;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
text-align:center;
}

.page-card canvas{
width:100%;
height:auto;
border:1px solid #ddd;
border-radius:5px;
}

.page-card button{
width:100%;
padding:8px;
margin-top:10px;
background:#007bff;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}

.page-card button:hover{
background:#0056b3;
}

#status{
text-align:center;
margin-top:15px;
font-weight:bold;
}
</style>

</head>

<body>
  

  <script>
function goHome(){
    window.location.href="../index.html";
}
</script>

<header>
    <button class="home-btn" onclick="goHome()">🏠 Home</button>

    <h1>📄 PDF to JPG</h1>
    <p>SARVATRA Tools</p>
</header>
<div class="container">

    <input
        type="file"
        id="pdfInput"
        accept="application/pdf"
    >

    <button id="convertBtn">
        🔄 Convert to JPG
    </button>

    <div id="pagesContainer"></div>

    <p id="status"></p>

</div>

  <script>

    const pdfInput = document.getElementById("pdfInput");
const convertBtn = document.getElementById("convertBtn");
const pagesContainer = document.getElementById("pagesContainer");
const status = document.getElementById("status");

let selectedFile = null;

pdfInput.addEventListener("change", function () {
    selectedFile = this.files[0];

    if (selectedFile) {
        status.textContent = "✅ PDF Selected: " + selectedFile.name;
    } else {
        status.textContent = "";
    }
});
    convertBtn.addEventListener("click", function () {

    if (!selectedFile) {
        alert("Please select a PDF file first!");
        return;
    }

    status.textContent = "⏳ Converting PDF to JPG...";

      const reader = new FileReader();

reader.onload = function(e){

    const typedArray = new Uint8Array(e.target.result);

    pdfjsLib.getDocument(typedArray).promise.then(function(pdf){

        status.textContent = "Total Pages: " + pdf.numPages;

        pagesContainer.innerHTML = "";

        // తర్వాత ఇక్కడ ప్రతి page ని JPG గా చూపించే code add చేస్తాం

    });

};

reader.readAsArrayBuffer(selectedFile);
});


  </script>

  
</body>
</html>
